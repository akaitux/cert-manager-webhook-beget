apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: acmetest-star-example-com
  namespace: someother
spec:
  secretName: star-example-com-tls
  duration: 2160h # 90d
  renewBefore: 360h # 15d
  dnsNames:
  - '*.example.com'
  issuerRef:
    name: letsencrypt-staging-with-beget
    kind: ClusterIssuer
